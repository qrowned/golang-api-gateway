apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: default
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      terminationGracePeriodSeconds: 30  # must be > server.shutdown_timeout (15s)
      containers:
        - name: gateway
          image: api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: GATEWAY_CONFIG_PATH
              value: /config/config.yaml
            - name: GATEWAY_REDIS_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: redis-address
                  optional: true
            - name: GATEWAY_AUTH_DOMAIN
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: auth-domain
                  optional: true
            - name: GATEWAY_AUTH_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: auth-audience
                  optional: true
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: config
          configMap:
            name: gateway-config
