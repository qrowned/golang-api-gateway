apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: default
data:
  config.yaml: |
    server:
      port: 8080
      read_timeout: 30s
      write_timeout: 30s
      shutdown_timeout: 15s

    upstreams:
      - name: users-service
        urls:
          - http://users-svc:8080
        cb_failure_ratio: 0.5
        cb_timeout: 30s
        cb_interval: 60s

    routes:
      - path: /api/v1/users/*
        upstream: users-service
        auth: true
        rate_limit: true
        methods: [GET, POST, PUT, DELETE]

    auth:
      domain: "your-tenant.auth0.com"
      audience: "https://api.your-domain.com"
      jwks_refresh_interval: 15m

    rate_limit:
      enabled: true
      default_rps: 100
      window_size: 1s
      key_strategy: ip
      local_fallback: true

    redis:
      address: "redis:6379"
      pool_size: 10

    cors:
      allowed_origins:
        - "https://app.your-domain.com"
      allow_credentials: true

    security:
      hsts_max_age: 31536000
      frame_options: "DENY"
      referrer_policy: "strict-origin-when-cross-origin"
